server {
    listen 80;
    server_name _;

    root /var/www/ctm-dashboard/dist;
    index index.html;

    # Serve the SPA — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /ctm-api/* → Control-M Automation API
    # Change the proxy_pass URL to match your CTM server.
    location /ctm-api/ {
        proxy_pass         https://<your-ctm-host>/automation-api/;
        proxy_ssl_verify   off;
        proxy_set_header   Host              $proxy_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_pass_header  x-api-key;
    }
}
